name: Deploy to GitHub Pages

on:
  push:
    branches: [ main, dev ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Create appsettings.json
        run: |
          cat > BinokelTracker.Web/wwwroot/appsettings.json << EOF
          {
            "Supabase": {
              "Url": "${{ secrets.SUPABASE_URL }}",
              "AnonKey": "${{ secrets.SUPABASE_ANON_KEY }}"
            },
            "Anthropic": {
              "ApiKey": "${{ secrets.ANTHROPIC_API_KEY }}"
            }
          }
          EOF

      - name: Publish
        run: dotnet publish BinokelTracker.Web/BinokelTracker.Web.csproj -c Release -o publish

      - name: Fix base href for GitHub Pages
        run: |
          REPO="${{ github.event.repository.name }}"
          sed -i "s|<base href=\"/\" />|<base href=\"/$REPO/\" />|g" publish/wwwroot/index.html

      - name: Add .nojekyll
        run: touch publish/wwwroot/.nojekyll

      - name: Copy index.html to 404.html (SPA routing)
        run: cp publish/wwwroot/index.html publish/wwwroot/404.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: publish/wwwroot

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
