<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>Binokel Tracker</title>
    <base href="/" />
    <link href="_content/BinokelTracker.Shared/css/app.css" rel="stylesheet" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
</head>
<body>
    <div id="app">
        <div class="loading-screen">
            <div class="loading-suits">♠ ♥ ♣ ♦</div>
            <div class="loading-text">Laden...</div>
        </div>
    </div>
    <div id="blazor-error-ui">
        Verbindungsfehler. <a href="">Neu laden</a>
    </div>
    <script src="_content/BinokelTracker.Shared/js/theme.js"></script>
    <script>
        window.captureWebcamPhoto = function () {
            return new Promise(function (resolve) {
                var input = document.createElement('input');
                input.type = 'file';
                input.accept = 'image/*';
                input.onchange = function () {
                    var file = input.files && input.files[0];
                    if (!file) { resolve(null); return; }
                    var reader = new FileReader();
                    reader.onload = function (e) {
                        var dataUrl = e.target.result;
                        resolve(dataUrl.split(',')[1]);
                    };
                    reader.readAsDataURL(file);
                };
                input.click();
            });
        };
    </script>
    <script src="_framework/blazor.webassembly.js"></script>
</body>
</html>
